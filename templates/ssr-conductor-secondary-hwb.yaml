Lausitzer HC Cottbus
Geschäftsstelle
Dresdener Str. 18
03050 Cottbus

                                                                Hennickendorf, XX.09.2025

Bescheid Nummer 2025-XX

Entscheidung:
Nach Prüfung des Sachverhalts und Eingang der Stellungnahme des Lausitzer HC Cottbus erlässt die Technische Kommission des Handball-Verbands Brandenburg (HVB) gemäß der Spiel- und Rechtsordnung des DHB folgenden Ordnungsbescheid gegen den Lausitzer HC Cottbus:

1. Der Mannschaftsverantwortliche Detlef Hüneburg wird mit sofortiger Wirkung für die Dauer von 4 Monaten gesperrt.
2. Der Spieler Anton Koppe wird für 3 Meisterschafts-/Pokalspiele gesperrt.
3. Gegen den Verein Lausitzer HC Cottbus wird eine Geldstrafe in Höhe von 500 € verhängt.

Die Sperren gelten verbandseinheitlich und sind auf alle dem DHB angeschlossenen Wettbewerbe, insbesondere der Regionalliga Ostsee-Spree und dem Spielbetrieb des HVB, anzuwenden. Die Geldstrafe ist innerhalb von 14 Tagen nach Erhalt dieses Bescheids auf das Konto des Handball-Verbands Brandenburg zu überweisen.

Begründung:
Im Rahmen der Saisonvorbereitung der 1. Männermannschaft des Lausitzer HC Cottbus kam es in den folgenden sechs Freundschaftsspielen zum unberechtigten Einsatz des Spielers Anton Koppe, der zum Zeitpunkt der Spiele erst 16 Jahre alt war und somit keine Spielberechtigung für den Erwachsenenbereich besaß:

* 13.08.2025 gegen den SC DHfK Leipzig
* 16.08.2025 beim Matthäi-Cup in Oranienburg gegen den Oranienburger HC
* 16.08.2025 beim Matthäi-Cup in Oranienburg gegen den Stralsunder HV
* 16.08.2025 beim Matthäi-Cup in Oranienburg gegen den HV G-W Werder
* 29.08.2025 gegen den HC Elbflorenz 2006 II
* 04.09.2025 gegen den MTV 1860 Altlandsberg

Um diesen Einsatz zu verschleiern, wurde der Spielausweis von Filip Biljaka verwendet und dieser auch im offiziellen Spielberichtsbogen eingetragen. Verantwortlich für diesen Vorgang war der Mannschaftsverantwortliche Detlef Hüneburg.

Das Verhalten stellt einen vorsätzlichen Missbrauch eines gültigen Spielausweises gemäß § 12 DHB-Rechtsordnung dar.

Darüber hinaus liegt ein Verstoß gegen § 22 DHB-RO – Jugendschutzbestimmungen vor, da der minderjährige Spieler ohne die erforderliche Spielberechtigung im Erwachsenenbereich eingesetzt wurde. Dieser Verstoß wiegt schwer, da hier der Schutz von Minderjährigen im Sport unmittelbar betroffen ist.

Bei der Strafbemessung wurde strafverschärfend berücksichtigt, dass der Einsatz des nicht spielberechtigten Spielers vorsätzlich in sechs Spielen erfolgte. Dazu wurde gezielt einer fremder Spielausweis missbraucht. Ebenfalls wiegt der Verstoß gegen den Jugendschutz besonders schwer - insbesondere im Hinblick auf den Einsatz gegen Männermannschaft aus dem Profibereich (Handball-Bundesliga).

Strafmildernd wurde berücksichtigt, dass der Verein die Verstöße vollumfänglich eingeräumt hat und die Spielereinsätze ausschließlich in Freundschaftsspielen und nicht in Pflichtspielen (Meisterschaft/Pokal) erfolgten.

Die Höhe der Geldstrafe bemisst sich an der Zahl der Spiele, in der der Spieler ohne Spielberechtigung eingesetzt wurde.

Bei Sperren bitte auch Rechtsordnung § 22 beachten!
Für Geldstrafen/-bußen, die gegen Einzelpersonen verhängt werden, haftet der Verein (§ 61 (7) RO)

3. Rechtsmittelbelehrung

